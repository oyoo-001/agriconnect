<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/Assets.xcassets/AppIcon.appiconset/_/32.png">
    <link rel="apple-touch-icon" href="/icons/Assets.xcassets/AppIcon.appiconset/_/180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1B5E20">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1B5E20;
            --primary-light: #2E7D32;
            --secondary: #43A047;
            --accent: #FFB300;
            --accent-dark: #FF8F00;
            --dark: #1a1a2e;
            --dark-2: #16213e;
            --light: #f8f9fa;
            --gray: #6c757d;
            --gray-light: #e9ecef;
            --white: #ffffff;
            --radius-sm: 8px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.12);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a3a1a 0%, var(--dark-2) 50%, var(--dark) 100%);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('images/farm-pic.jpg') center/cover no-repeat;
            opacity: 0.08;
            z-index: 0;
        }
        .auth-container {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            position: relative;
            z-index: 1;
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-decoration: none;
        }
        .auth-logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--primary);
            flex-shrink: 0;
        }
        .auth-logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h2 {
            text-align: center;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--dark);
        }
        input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid var(--gray-light);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--white);
        }
        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(67, 160, 71, 0.15);
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            border: none;
            padding: 0.9rem;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(46,125,50,0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--gray);
        }
        .links a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .back-link {
            text-align: center;
            margin-top: 1rem;
        }
        .back-link a {
            color: var(--gray);
            font-size: 0.85rem;
            text-decoration: none;
        }
        .back-link a:hover {
            color: var(--primary);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--gray);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-light);
        }
        #googleButtonContainer {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 0.5rem;
        }
        #googleButtonContainer iframe {
            transform: scale(1.15);
        }
        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }
        .forgot-password a {
            color: var(--gray);
            font-size: 0.85rem;
            text-decoration: none;
        }
        .forgot-password a:hover {
            color: var(--primary);
        }
        /* ---- Toast ---- */
        .toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-radius: var(--radius-sm);
            background: var(--white);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            min-width: 320px;
            max-width: 420px;
            animation: toastIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            border-left: 4px solid;
        }
        .toast.removing {
            animation: toastOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(100%) scale(0.9); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0) scale(1); }
            to { opacity: 0; transform: translateX(100%) scale(0.9); }
        }
        .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .toast-msg {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--dark);
        }
        .toast-close {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--gray);
            padding: 0;
            line-height: 1;
            transition: var(--transition);
        }
        .toast-close:hover { color: var(--dark); }
        .toast.error { border-left-color: #dc2626; }
        .toast.error .toast-icon { background: #fef2f2; color: #dc2626; }
        .toast.success { border-left-color: #16a34a; }
        .toast.success .toast-icon { background: #f0fdf4; color: #16a34a; }
        .toast.info { border-left-color: #2563eb; }
        .toast.info .toast-icon { background: #eff6ff; color: #2563eb; }
        .toast.warning { border-left-color: var(--accent-dark); }
        .toast.warning .toast-icon { background: #fffbeb; color: var(--accent-dark); }
        @media (max-width: 480px) {
            .auth-container { padding: 2rem 1.5rem; }
            .toast-container { top: 1rem; right: 1rem; left: 1rem; }
            .toast { min-width: auto; max-width: none; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="landing-page" class="auth-logo">
            <div class="auth-logo-icon">
                <img src="icons/Assets.xcassets/AppIcon.appiconset/_/64.png" alt="AgriConnect Logo">
            </div>
            AgriConnect
        </a>
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to your AgriConnect account</p>
        <form id="loginForm">
            <div class="form-group" id="loginEmailGroup">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group" id="loginPasswordGroup">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
                <div class="forgot-password">
                    <a href="forgot-password">Forgot password?</a>
                </div>
            </div>
            <div class="form-group" id="login2faGroup" style="display:none">
                <label for="twoFactorCode">Two-Factor Authentication Code</label>
                <input type="text" id="twoFactorCode" placeholder="Enter 6-digit code from authenticator app" maxlength="6" inputmode="numeric" pattern="[0-9]*">
                <p style="font-size:0.8rem;color:var(--gray);margin-top:0.4rem">Open your Google Authenticator app and enter the code.</p>
            </div>
            <button type="submit" class="btn" id="loginBtn">Log In</button>
        </form>
        <div class="divider" id="loginDivider">or continue with</div>
        <div id="googleButtonContainer"></div>
        <div class="links">
            <p>Don't have an account? <a href="signup">Sign up</a></p>
        </div>
        <div class="back-link">
            <a href="landing-page">← Back to home</a>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        function showToast(message, type) {
            type = type || 'info';
            const container = document.getElementById('toastContainer');
            const icons = { error: '✕', success: '✓', info: 'ℹ', warning: '⚠' };
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML =
                '<div class="toast-icon">' + (icons[type] || 'ℹ') + '</div>' +
                '<div class="toast-msg">' + message + '</div>' +
                '<button class="toast-close" onclick="this.parentElement.classList.add(\'removing\');setTimeout(()=>this.parentElement.remove(),300)">×</button>';
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('removing');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }

        function initGoogleGSI(clientId) {
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) {
                setTimeout(() => initGoogleGSI(clientId), 100);
                return;
            }
            google.accounts.id.initialize({
                client_id: clientId,
                callback: handleGoogleCredential,
                ux_mode: 'popup'
            });
            google.accounts.id.renderButton(
                document.getElementById('googleButtonContainer'),
                { type: 'standard', shape: 'rectangular', theme: 'outline', size: 'large', text: 'signin_with', width: 300 }
            );
        }

        fetch('/api/auth/google-client-id')
            .then(r => r.json())
            .then(data => { initGoogleGSI(data.clientId); })
            .catch(() => {});

        // Persist auth session to both localStorage (reload-safe) and sessionStorage
        function persistSession(data) {
            const userJson = JSON.stringify(data);
            localStorage.setItem('user', userJson);
            localStorage.setItem('idToken', data.token || '');
            sessionStorage.setItem('user', userJson);
            sessionStorage.setItem('idToken', data.token || '');
        }

        function handleRoleRedirect(data) {
            const roleMap = { admin: 'admin', farmer: 'farmer', organization: 'organisation', consumer: 'consumer' };
            return roleMap[data.role] || 'consumer';
        }

        let pending2faUid = null;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginBtn = document.getElementById('loginBtn');

            // If we're in 2FA step
            if (pending2faUid) {
                const code = document.getElementById('twoFactorCode').value.trim();
                if (!code || code.length < 6) {
                    showToast('Please enter your 6-digit 2FA code', 'error');
                    return;
                }
                loginBtn.disabled = true;
                loginBtn.innerHTML = 'Verifying...';
                try {
                    const response = await fetch('/api/auth/2fa/login-challenge', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ uid: pending2faUid, code })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        persistSession(data);
                        showToast('Login successful! Redirecting...', 'success');
                        const redirect = handleRoleRedirect(data);
                        setTimeout(() => { window.location.href = redirect; }, 1000);
                    } else {
                        showToast(data.error || 'Invalid code', 'error');
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Verify';
                    }
                } catch (error) {
                    showToast(getAuthErrorMessage(error), 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Verify';
                }
                return;
            }

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Logging in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    if (data.require2fa) {
                        pending2faUid = data.uid;
                        document.getElementById('loginEmailGroup').style.display = 'none';
                        document.getElementById('loginPasswordGroup').style.display = 'none';
                        document.getElementById('loginDivider').style.display = 'none';
                        document.getElementById('googleButtonContainer').style.display = 'none';
                        document.querySelector('.links').style.display = 'none';
                        document.querySelector('.back-link').style.display = 'none';
                        document.getElementById('login2faGroup').style.display = 'block';
                        document.querySelector('.auth-subtitle').textContent = 'Enter the code from your authenticator app';
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Verify';
                        document.getElementById('twoFactorCode').focus();
                        return;
                    }
                    persistSession(data);
                    showToast('Login successful! Redirecting...', 'success');
                    const redirect = handleRoleRedirect(data);
                    setTimeout(() => { window.location.href = redirect; }, 1000);
                }
            } catch (error) {
                showToast(getAuthErrorMessage(error), 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log In';
            }
        });

        function handleGoogleCredential(response) {
            const credential = response.credential;
            fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: credential })
            })
            .then(res => res.json())
            .then(data => {
                if (data.user || data.id || data.uid) {
                    persistSession(data);
                    showToast('Welcome back! Redirecting...', 'success');
                    const redirect = handleRoleRedirect(data);
                    setTimeout(() => { window.location.href = redirect; }, 1000);
                } else if (data.error && data.error.includes('not found')) {
                    showToast('Account not found. Redirecting to sign up...', 'info');
                    setTimeout(() => { window.location.href = 'signup'; }, 1500);
                } else {
                    showToast(data.error || 'Google login failed', 'error');
                }
            })
            .catch(() => {
                showToast('Google login failed. Please try again.', 'error');
            });
        }

        function getAuthErrorMessage(error) {
            if (error.status === 0) return 'Network error. Check your connection and try again.';
            if (error.status === 429) return 'Too many attempts. Please try again later.';
            const msg = (error.error && error.error.message) || error.message || error.error || '';
            if (/invalid.*email|email.*invalid/i.test(msg)) return 'Invalid email address';
            if (/invalid.*(credential|password)|wrong.*password|user.*not.*found/i.test(msg)) return 'Invalid email or password';
            if (/disabled/i.test(msg)) return 'This account has been disabled. Contact support.';
            if (/network/i.test(msg)) return 'Network error. Check your connection and try again.';
            return msg || 'An error occurred. Please try again.';
        }
    </script>

    <script>
        // ---------- Register Service Worker ----------
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
