<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – AgriConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1B5E20;
            --primary-light: #2E7D32;
            --secondary: #43A047;
            --accent: #FFB300;
            --accent-dark: #FF8F00;
            --dark: #1a1a2e;
            --dark-2: #16213e;
            --light: #f8f9fa;
            --gray: #6c757d;
            --gray-light: #e9ecef;
            --white: #ffffff;
            --radius-sm: 8px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a3a1a 0%, var(--dark-2) 50%, var(--dark) 100%);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('images/farm-pic.jpg') center/cover no-repeat;
            opacity: 0.08;
            z-index: 0;
        }
        .auth-container {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-md);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--dark);
            text-decoration: none;
            margin-bottom: 1.5rem;
        }
        .auth-logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h2 {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: var(--gray);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.4rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--gray-light);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--dark);
            background: var(--light);
            transition: var(--transition);
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--secondary);
            background: var(--white);
        }
        .btn {
            width: 100%;
            padding: 0.85rem;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            box-shadow: 0 4px 15px rgba(27,94,32,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(27,94,32,0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
        }
        .links a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .links a:hover { text-decoration: underline; }
        .back-link {
            text-align: center;
            margin-top: 1rem;
        }
        .back-link a {
            color: var(--gray);
            font-size: 0.85rem;
            text-decoration: none;
        }
        .back-link a:hover { color: var(--dark); }

        .success-container { display: none; text-align: center; }
        .success-container.active { display: block; animation: slideUp 0.5s ease-out; }
        .error-container { display: none; text-align: center; }
        .error-container.active { display: block; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--white);
            border-radius: var(--radius-sm);
            padding: 0.85rem 1.25rem;
            box-shadow: var(--shadow-md);
            min-width: 280px;
            max-width: 400px;
            animation: slideIn 0.3s ease-out;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .toast.removing { animation: slideOut 0.3s ease-in forwards; }
        .toast.error { border-left: 4px solid #e74c3c; }
        .toast.success { border-left: 4px solid var(--secondary); }
        .toast.info { border-left: 4px solid #3498db; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        @media (max-width: 480px) {
            .auth-container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="landing-page" class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 6c-3.3 0-6 2.7-6 6h12c0-3.3-2.7-6-6-6z"/><path d="M4 14c0 2 1.5 3 4 4l1 2M20 14c0 2-1.5 3-4 4l-1 2"/><path d="M8 18h8"/></svg>
            </div>
            AgriConnect
        </a>

        <div id="resetForm">
            <h2>Set New Password</h2>
            <p class="auth-subtitle">Enter your new password below.</p>
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" required placeholder="Min 6 characters" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn btn-primary" id="resetBtn">Reset Password</button>
            </form>
        </div>

        <div class="success-container" id="successContainer">
            <h2>Password Reset!</h2>
            <p class="auth-subtitle">Your password has been successfully reset.</p>
            <div class="links">
                <a href="login">Return to Login</a>
            </div>
        </div>

        <div class="error-container" id="errorContainer">
            <h2>Invalid Link</h2>
            <p class="auth-subtitle">This password reset link is invalid or has expired.</p>
            <div class="links">
                <a href="forgot-password">Request a new reset link</a>
            </div>
        </div>

        <div class="back-link">
            <a href="login">← Back to Login</a>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function showToast(message, type) {
            type = type || 'info';
            const container = document.getElementById('toastContainer');
            const icons = { error: '✕', success: '✓', info: 'ℹ' };
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML =
                '<div class="toast-icon">' + (icons[type] || 'ℹ') + '</div>' +
                '<div class="toast-msg">' + message + '</div>' +
                '<button class="toast-close" onclick="this.parentElement.classList.add(\'removing\');setTimeout(()=>this.parentElement.remove(),300)">×</button>';
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('removing');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('errorContainer').classList.add('active');
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showToast('Passwords do not match', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('successContainer').classList.add('active');
                } else {
                    showToast(data.error || 'Failed to reset password', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch (error) {
                showToast('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
