<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AgriConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1B5E20;
            --primary-light: #2E7D32;
            --secondary: #43A047;
            --accent: #FFB300;
            --accent-dark: #FF8F00;
            --dark: #1a1a2e;
            --dark-2: #16213e;
            --light: #f8f9fa;
            --gray: #6c757d;
            --gray-light: #e9ecef;
            --white: #ffffff;
            --radius-sm: 8px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.12);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a3a1a 0%, var(--dark-2) 50%, var(--dark) 100%);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('images/farm-pic.jpg') center/cover no-repeat;
            opacity: 0.08;
            z-index: 0;
        }
        .auth-container {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            position: relative;
            z-index: 1;
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-decoration: none;
        }
        .auth-logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        h2 {
            text-align: center;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--dark);
        }
        input, select {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid var(--gray-light);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--white);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(67, 160, 71, 0.15);
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            border: none;
            padding: 0.9rem;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(46,125,50,0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--gray);
        }
        .links a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .back-link {
            text-align: center;
            margin-top: 1rem;
        }
        .back-link a {
            color: var(--gray);
            font-size: 0.85rem;
            text-decoration: none;
        }
        .back-link a:hover {
            color: var(--primary);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--gray);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-light);
        }
        .google-btn {
            width: 100%;
            background: var(--white);
            color: var(--dark);
            border: 1.5px solid var(--gray-light);
            padding: 0.85rem;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .google-btn:hover {
            background: #f8f9fa;
            border-color: #d0d0d0;
        }
        .google-btn img {
            width: 20px;
            height: 20px;
        }
        /* ---- Toast ---- */
        .toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-radius: var(--radius-sm);
            background: var(--white);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            min-width: 320px;
            max-width: 420px;
            animation: toastIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            border-left: 4px solid;
        }
        .toast.removing {
            animation: toastOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(100%) scale(0.9); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0) scale(1); }
            to { opacity: 0; transform: translateX(100%) scale(0.9); }
        }
        .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .toast-msg {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--dark);
        }
        .toast-close {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--gray);
            padding: 0;
            line-height: 1;
            transition: var(--transition);
        }
        .toast-close:hover { color: var(--dark); }
        .toast.error { border-left-color: #dc2626; }
        .toast.error .toast-icon { background: #fef2f2; color: #dc2626; }
        .toast.success { border-left-color: #16a34a; }
        .toast.success .toast-icon { background: #f0fdf4; color: #16a34a; }
        .toast.info { border-left-color: #2563eb; }
        .toast.info .toast-icon { background: #eff6ff; color: #2563eb; }
        .toast.warning { border-left-color: var(--accent-dark); }
        .toast.warning .toast-icon { background: #fffbeb; color: var(--accent-dark); }
        @media (max-width: 480px) {
            .auth-container { padding: 2rem 1.5rem; }
            .toast-container { top: 1rem; right: 1rem; left: 1rem; }
            .toast { min-width: auto; max-width: none; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="landing-page" class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 6c-3.3 0-6 2.7-6 6h12c0-3.3-2.7-6-6-6z"/><path d="M4 14c0 2 1.5 3 4 4l1 2M20 14c0 2-1.5 3-4 4l-1 2"/><path d="M8 18h8"/></svg>
            </div>
            AgriConnect
        </a>
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join our farm-to-market community</p>
        <form id="signupForm">
            <div class="form-group">
                <label for="displayName">Full Name</label>
                <input type="text" id="displayName" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Min 6 characters">
            </div>
            <div class="form-group">
                <label for="signupRole">I am a <span style="color:var(--danger)">*</span></label>
                <select id="signupRole" required>
                    <option value="">Select your role</option>
                    <option value="consumer">Consumer</option>
                    <option value="organization">Organisation</option>
                    <option value="farmer">Farmer</option>
                </select>
            </div>
            <button type="submit" class="btn" id="signupBtn">Create Account</button>
        </form>
        <div class="divider">or continue with</div>
        <button class="google-btn" id="googleSignUp">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
        </button>
        <div class="links">
            <p>Already have an account? <a href="login">Log in</a></p>
        </div>
        <div class="back-link">
            <a href="landing-page">← Back to home</a>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        function showToast(message, type) {
            type = type || 'info';
            const container = document.getElementById('toastContainer');
            const icons = { error: '✕', success: '✓', info: 'ℹ', warning: '⚠' };
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML =
                '<div class="toast-icon">' + (icons[type] || 'ℹ') + '</div>' +
                '<div class="toast-msg">' + message + '</div>' +
                '<button class="toast-close" onclick="this.parentElement.classList.add(\'removing\');setTimeout(()=>this.parentElement.remove(),300)">×</button>';
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('removing');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }

        let googleClientId = null;

        fetch('/api/auth/google-client-id')
            .then(r => r.json())
            .then(data => { googleClientId = data.clientId; })
            .catch(() => {});

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const displayName = document.getElementById('displayName').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('signupRole').value;
            const signupBtn = document.getElementById('signupBtn');

            if (!role) {
                showToast('Please select your role.', 'warning');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating account...';

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, displayName, role })
                });
                const data = await response.json();
                if (response.ok) {
                    sessionStorage.setItem('user', JSON.stringify(data));
                    if (data.token) sessionStorage.setItem('idToken', data.token);
                    showToast('Account created! Redirecting...', 'success');
                    const redirect = data.role === 'admin' ? 'admin' : data.role === 'farmer' ? 'farmer' : data.role === 'organization' ? 'organisation' : 'consumer';
                    setTimeout(() => { window.location.href = redirect; }, 1500);
                } else {
                    showToast(data.error || 'Signup failed', 'error');
                }
            } catch (error) {
                showToast('An error occurred. Please try again.', 'error');
            }
            signupBtn.disabled = false;
            signupBtn.textContent = 'Create Account';
        });

        document.getElementById('googleSignUp').addEventListener('click', () => {
            const role = document.getElementById('signupRole').value;
            if (!role) {
                showToast('Please select your role before signing up.', 'warning');
                return;
            }
            if (!googleClientId) {
                showToast('Google sign-in is not available right now. Try again.', 'error');
                return;
            }
            google.accounts.id.initialize({
                client_id: googleClientId,
                callback: async (response) => {
                    const googleBtn = document.getElementById('googleSignUp');
                    googleBtn.disabled = true;
                    googleBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke="#4285F4" stroke-width="2" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg> Signing up...';
                    try {
                        const res = await fetch('/api/auth/google', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ idToken: response.credential, role })
                        });
                        const data = await res.json();
                        if (res.ok) {
                            sessionStorage.setItem('user', JSON.stringify(data));
                            if (data.token) sessionStorage.setItem('idToken', data.token);
                            showToast('Account created! Redirecting...', 'success');
                            const redirect = data.role === 'admin' ? 'admin' : data.role === 'farmer' ? 'farmer' : data.role === 'organization' ? 'organisation' : 'consumer';
                            setTimeout(() => { window.location.href = redirect; }, 1500);
                        } else {
                            showToast(data.error || 'Google sign-up failed', 'error');
                        }
                    } catch (err) {
                        showToast('An error occurred. Please try again.', 'error');
                    }
                    googleBtn.disabled = false;
                    googleBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Sign up with Google';
                }
            });
            google.accounts.id.prompt();
        });
    </script>
</body>
</html>
